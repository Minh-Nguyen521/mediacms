listen              1935;
max_connections     100;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      10;
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
    }
    http_hooks {
        enabled         on;
        on_publish      http://web:9000/livestreams/callback/on_publish/;
        on_unpublish    http://web:9000/livestreams/callback/on_unpublish/;
    }
}
